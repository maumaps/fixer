[service]
database_path = "/var/lib/fixer/fixer.sqlite3"
state_dir = "/var/lib/fixer"
poll_interval_seconds = 300
collect_processes = true
collect_crashes = true
collect_warnings = true
collect_perf = true
collect_bpftrace = false
perf_duration_seconds = 3
coredump_limit = 10
journal_lines = 50
proposal_bundle_retention_days = 7
proposal_bundle_keep_per_opportunity = 2
watched_repos = []
warning_logs = []

[patch]
codex_command = "codex"
codex_args = []
model = "gpt-5.5"
spark_model = ""
sandbox = "workspace-write"
approval_policy = "never"
extra_instructions = "Keep the change narrowly scoped and summarize validation clearly."
plan_before_patch = true
review_after_patch = true
review_fix_passes = 2
spark_fallback_on_rate_limit = false
rate_limit_cooldown_seconds = 21600
auth_mode = "user-lease"
lease_budget_preset = "conservative"
lease_default_ttl_seconds = 28800
lease_failure_pause_threshold = 3
lease_failure_pause_window_seconds = 1800
lease_bootstrap_enable_linger = true

[network]
server_url = "https://fixer.maumap.com"
sync_interval_seconds = 900
connect_timeout_seconds = 20
submission_pow_difficulty = 4
worker_pow_difficulty = 5
max_submission_items = 50

[participation]
mode = "local-only"
richer_evidence_allowed = false

[privacy]
policy_version = "2026-03-29"
redact_known_secrets = true
require_opt_in_for_upload = true
require_secondary_opt_in_for_richer_evidence = true

[server]
listen = "127.0.0.1:8080"
postgres_url = "sqlite:///var/lib/fixer-server/fixer-server.sqlite3"
submission_pow_difficulty = 4
worker_pow_difficulty = 5
max_payload_bytes = 524288
max_bundle_items = 50
quarantine_corroboration_threshold = 2
lease_seconds = 3600
worker_attempt_cooldown_seconds = 3600
worker_trust_minimum = 2
max_submissions_per_hour = 60
max_work_pulls_per_hour = 60
max_abuse_events_before_ban = 8
